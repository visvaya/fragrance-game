# Supabase local development configuration.
# Run `supabase start` to start the local stack (requires Docker).
# Run `supabase db push --local` to apply migrations to the local instance.
# Run `supabase db diff` to compare local schema with remote.
#
# WARNING: seed.sql moves extensions to the `extensions` schema after migrations run.
# This is required because cloud Supabase installs extensions in `extensions` schema,
# but local Supabase installs them in `public` by default. Without this, functions
# like extensions.similarity(), extensions.dmetaphone() fail locally.

project_id = "rirboszzqowftfrfmmzp"

[api]
enabled = true
port = 54321
# Expose both public and extensions schemas via PostgREST (mirrors cloud behaviour).
schemas = ["public", "extensions", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329

[db.seed]
enabled = true
# seed.sql runs after all migrations. It installs fuzzystrmatch (not in migrations)
# and moves extensions to the `extensions` schema to match cloud Supabase.
sql_paths = ["./seed.sql"]

[realtime]
enabled = true
ip_version = "IPv6"
max_header_length = 4096

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.image_transformation]
enabled = false

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://127.0.0.1:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
# Project uses signInAnonymously() — required for E2E tests and the game itself.
enable_anonymous_sign_ins = true
enable_manual_linking = false
minimum_password_length = 6
password_requirements = ""

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
otp_length = 6
otp_expiry = 3600

[analytics]
enabled = false
